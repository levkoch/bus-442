<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seattle Transit — Live Stop Viewer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0c10; --panel: #11141a; --border: #1e2330;
    --accent: #FF6EC7; --text: #c8d0e0; --muted: #4a5268;
  }
  html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; overflow: hidden; }
  #map-container { position: absolute; inset: 0; }
  #tile-canvas { position: absolute; inset: 0; }
  #stop-svg { position: absolute; inset: 0; pointer-events: none; }
  #stop-svg circle { pointer-events: all; }

  #controls {
    position: absolute; top: 24px; left: 24px; width: 300px;
    background: rgba(11,14,20,0.93); border: 1px solid var(--border);
    border-radius: 4px; backdrop-filter: blur(12px); padding: 24px;
    z-index: 10; box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }
  #controls h1 { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: #fff; letter-spacing: -0.5px; margin-bottom: 4px; }
  #controls h1 span { color: var(--accent); }
  .subtitle { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 28px; }
  .control-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 10px; }

  #day-selector { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 28px; }
  .day-btn {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    font-family: 'DM Mono', monospace; font-size: 9px; text-transform: uppercase;
    padding: 7px 0; cursor: pointer; border-radius: 2px; transition: all 0.15s; text-align: center;
  }
  .day-btn:hover { border-color: var(--accent); color: var(--accent); }
  .day-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 500; }

  #time-display {
    font-family: 'Syne', sans-serif; font-size: 42px; font-weight: 800;
    color: #fff; letter-spacing: -2px; line-height: 1; margin-bottom: 12px; text-align: center;
  }
  #time-display span { color: var(--accent); }

  input[type=range] { -webkit-appearance: none; width: 100%; height: 2px; background: var(--border); outline: none; cursor: pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--accent); cursor: pointer; box-shadow: 0 0 10px var(--accent); }
  input[type=range]::-moz-range-thumb { width: 16px; height: 16px; border-radius: 50%; background: var(--accent); cursor: pointer; border: none; }
  .slider-labels { display: flex; justify-content: space-between; font-size: 9px; color: var(--muted); margin-top: 8px; margin-bottom: 24px; }

  #stats { display: flex; gap: 12px; padding-top: 20px; border-top: 1px solid var(--border); }
  .stat { flex: 1; text-align: center; }
  .stat-val { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; color: var(--accent); display: block; }
  .stat-lbl { font-size: 8px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); }

  #legend {
    position: absolute; bottom: 24px; left: 24px; display: flex; gap: 16px;
    background: rgba(11,14,20,0.85); border: 1px solid var(--border); border-radius: 4px;
    padding: 10px 16px; font-size: 10px; color: var(--muted); backdrop-filter: blur(8px); z-index: 10;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  #tooltip {
    position: absolute; background: rgba(11,14,20,0.96); border: 1px solid var(--border);
    border-radius: 4px; padding: 10px 14px; font-size: 11px; pointer-events: none;
    opacity: 0; z-index: 20; max-width: 220px; transition: opacity 0.1s;
  }
  #tooltip .tt-name { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  #tooltip .tt-routes { color: var(--muted); font-size: 10px; margin-bottom: 6px; }
  #tooltip .tt-times { color: var(--accent); font-size: 11px; line-height: 1.6; }

  #loading {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; background: var(--bg); z-index: 100; gap: 12px;
  }
  #loading h2 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: #fff; }
  #loading p { font-size: 11px; color: var(--muted); }
  .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <h2>Loading transit data…</h2>
  <p id="loading-msg">Fetching route information</p>
</div>

<div id="map-container">
  <canvas id="tile-canvas"></canvas>
  <svg id="stop-svg"></svg>
</div>

<div id="controls">
  <h1>Seattle <span>Transit</span></h1>
  <div class="subtitle">Stop Activity Viewer</div>
  <div class="control-label">Day of Week</div>
  <div id="day-selector">
    <button class="day-btn" data-day="0">Mon</button>
    <button class="day-btn active" data-day="1">Tue</button>
    <button class="day-btn" data-day="2">Wed</button>
    <button class="day-btn" data-day="3">Thu</button>
    <button class="day-btn" data-day="4">Fri</button>
    <button class="day-btn" data-day="5">Sat</button>
    <button class="day-btn" data-day="6">Sun</button>
  </div>
  <div class="control-label">Selected Time</div>
  <div id="time-display">07<span>:00</span></div>
  <input type="range" id="time-slider" min="0" max="287" step="1" value="84">
  <div class="slider-labels"><span>00:00</span><span>06:00</span><span>12:00</span><span>18:00</span><span>23:55</span></div>
  <div id="stats">
    <div class="stat"><span class="stat-val" id="stat-active">—</span><span class="stat-lbl">Active Stops</span></div>
    <div class="stat"><span class="stat-val" id="stat-total">—</span><span class="stat-lbl">Total Stops</span></div>
    <div class="stat"><span class="stat-val" id="stat-arrivals">—</span><span class="stat-lbl">Arrivals Soon</span></div>
  </div>
</div>

<div id="legend">
  <div class="legend-item"><div class="legend-dot" style="background:rgba(80,120,200,0.7)"></div><span>Bus stop</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#e8ff47;box-shadow:0 0 6px rgba(232,255,71,0.8)"></div><span>Arriving within 5 min</span></div>
</div>

<div id="tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-routes" id="tt-routes"></div>
  <div class="tt-times" id="tt-times"></div>
</div>

<script>
const TILE_SIZE = 256;
const BASE_ZOOM = 12;
const SEATTLE = { lat: 47.608, lon: -122.335 };

// ── Mercator: lat/lon → world pixel at BASE_ZOOM ─────────────────────────────
function latLonToWorld(lat, lon) {
  const scale = TILE_SIZE * Math.pow(2, BASE_ZOOM);
  const x = (lon + 180) / 360 * scale;
  const sinLat = Math.sin(lat * Math.PI / 180);
  const y = (0.5 - Math.log((1 + sinLat) / (1 - sinLat)) / (4 * Math.PI)) * scale;
  return { x, y };
}

function worldToScreen(wx, wy, t) {
  return { x: t.x + wx * t.k, y: t.y + wy * t.k };
}

// ── Setup ─────────────────────────────────────────────────────────────────────
let W = window.innerWidth, H = window.innerHeight;
const canvas = document.getElementById('tile-canvas');
const ctx = canvas.getContext('2d');
const stopSvg = d3.select('#stop-svg');

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W; canvas.height = H;
  stopSvg.attr('width', W).attr('height', H);
}
resize();
window.addEventListener('resize', () => { resize(); scheduleRender(); });

// Center on Seattle
const sw = latLonToWorld(SEATTLE.lat, SEATTLE.lon);
let transform = d3.zoomIdentity.translate(W / 2 - sw.x, H / 2 - sw.y);

// ── Tile cache & drawing ──────────────────────────────────────────────────────
const tileCache = new Map();

function getTile(z, x, y) {
  const key = `${z}/${x}/${y}`;
  if (tileCache.has(key)) return tileCache.get(key);
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.src = `https://tile.openstreetmap.org/${z}/${x}/${y}.png`;
  img.onload = () => scheduleRender();
  tileCache.set(key, img);
  return img;
}

function drawTiles() {
  ctx.fillStyle = '#1a1f2e';
  ctx.fillRect(0, 0, W, H);

  // Clamp tile zoom to integer nearest log2(k) + BASE_ZOOM
  const tileZoom = Math.min(19, Math.max(0, Math.round(Math.log2(transform.k) + BASE_ZOOM)));
  // How large is one tile in screen pixels at this zoom level?
  // A tile at tileZoom covers 2^(BASE_ZOOM-tileZoom) base-zoom pixels, scaled by k
  const tileScreenPx = TILE_SIZE * transform.k * Math.pow(2, tileZoom - BASE_ZOOM) / Math.pow(2, tileZoom - BASE_ZOOM);
  // Simpler: world px per tile = TILE_SIZE * 2^(BASE_ZOOM-tileZoom), screen px = world * k
  const worldPxPerTile = TILE_SIZE * Math.pow(2, BASE_ZOOM - tileZoom);
  const screenPxPerTile = worldPxPerTile * transform.k;

  const n = Math.pow(2, tileZoom);

  // Tile index of top-left visible corner
  const tx0 = Math.floor(-transform.x / screenPxPerTile);
  const ty0 = Math.floor(-transform.y / screenPxPerTile);
  const tx1 = Math.ceil((-transform.x + W) / screenPxPerTile);
  const ty1 = Math.ceil((-transform.y + H) / screenPxPerTile);

  for (let tx = tx0; tx <= tx1; tx++) {
    for (let ty = ty0; ty <= ty1; ty++) {
      if (ty < 0 || ty >= n) continue;
      const txx = ((tx % n) + n) % n;
      const img = getTile(tileZoom, txx, ty);
      // Screen position of this tile's top-left corner
      const sx = transform.x + tx * screenPxPerTile;
      const sy = transform.y + ty * screenPxPerTile;
      if (img.complete && img.naturalWidth > 0) {
        ctx.drawImage(img, sx, sy, screenPxPerTile + 1, screenPxPerTile + 1);
      }
    }
  }
}

// ── State ─────────────────────────────────────────────────────────────────────
let stopList = [];
let selectedDay = 1;
let sliderVal = 84;

function sliderToMinutes(v) { return v * 5; }
function timeStrToMinutes(t) {
  if (!t) return -1;
  const [h, m] = t.split(':');
  return parseInt(h) * 60 + parseInt(m);
}

function getIncomingTimes(stop) {
  const dayStr = String(selectedDay);
  const cur = sliderToMinutes(sliderVal);
  const end = cur + 5;
  const arrivals = [];
  for (const route of Object.values(stop.routes)) {
    for (const t of (route.trips?.[dayStr] || [])) {
      const m = timeStrToMinutes(t);
      if (m >= cur && m <= end) arrivals.push({ time: t, route: route.short_name });
    }
  }
  return arrivals;
}

function updateTimeDisplay() {
  const mins = sliderToMinutes(sliderVal);
  const h = String(Math.floor(mins / 60) % 24).padStart(2, '0');
  const m = String(mins % 60).padStart(2, '0');
  document.getElementById('time-display').innerHTML = `${h}<span>:${m}</span>`;
}

// ── Draw stops (SVG, viewport-culled) ────────────────────────────────────────
function drawStops() {
  if (!stopList.length) return;
  const dayStr = String(selectedDay);
  const pad = 20;

  const visible = stopList.filter(s => {
    if (!s.hasDay[dayStr]) return false;
    const p = worldToScreen(s.wx, s.wy, transform);
    return p.x >= -pad && p.x <= W + pad && p.y >= -pad && p.y <= H + pad;
  });

  const r = Math.max(2.5, Math.min(5, transform.k * 0.35));

  const circles = stopSvg.selectAll('circle').data(visible, d => d.id);

  circles.enter().append('circle')
    .on('mousemove', function(event, d) {
      const incoming = getIncomingTimes(d);
      const routes = Object.values(d.routes).map(r => r.short_name).join(', ');
      document.getElementById('tt-name').textContent = d.name;
      document.getElementById('tt-routes').textContent = `Routes: ${routes}`;
      document.getElementById('tt-times').innerHTML = incoming.length
        ? incoming.map(a => `⬤ Route ${a.route} — ${a.time}`).join('<br>')
        : '<span style="color:#4a5268">No arrivals in next 5 min</span>';
      const tip = document.getElementById('tooltip');
      tip.style.opacity = 1;
      tip.style.left = (event.pageX + 14) + 'px';
      tip.style.top  = (event.pageY - 10) + 'px';
    })
    .on('mouseleave', () => { document.getElementById('tooltip').style.opacity = 0; })
    .merge(circles)
    .each(function(d) {
      const p = worldToScreen(d.wx, d.wy, transform);
      const incoming = getIncomingTimes(d);
      const active = incoming.length > 0;
      d3.select(this)
        .attr('cx', p.x).attr('cy', p.y)
        .attr('r', active ? r * 2 : r)
        .attr('fill', active ? '#FF6EC7' : '#ffffff')
        .attr('stroke', '#000000')
        .attr('stroke-width', 1.5)
        .style('filter', 'none');
    });

  circles.exit().remove();

  // Stats
  let totalArrivals = 0;
  const activeCount = visible.filter(s => {
    const n = getIncomingTimes(s).length;
    totalArrivals += n;
    return n > 0;
  }).length;
  document.getElementById('stat-active').textContent = activeCount.toLocaleString();
  document.getElementById('stat-total').textContent = visible.length.toLocaleString();
  document.getElementById('stat-arrivals').textContent = totalArrivals.toLocaleString();
}

// ── Render loop (RAF-throttled) ───────────────────────────────────────────────
let rafPending = false;
function scheduleRender() {
  if (rafPending) return;
  rafPending = true;
  requestAnimationFrame(() => {
    rafPending = false;
    drawTiles();
    drawStops();
  });
}

// ── Zoom ──────────────────────────────────────────────────────────────────────
const zoomBehavior = d3.zoom()
  .scaleExtent([0.7, 18])
  .on('zoom', (event) => {
    transform = event.transform;
    scheduleRender();
  });

d3.select('#map-container')
  .call(zoomBehavior)
  .call(zoomBehavior.transform, transform);

// ── Controls ──────────────────────────────────────────────────────────────────
document.querySelectorAll('.day-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedDay = parseInt(btn.dataset.day);
    scheduleRender();
  });
});

document.getElementById('time-slider').addEventListener('input', function() {
  sliderVal = parseInt(this.value);
  updateTimeDisplay();
  scheduleRender();
});

// ── Load data ─────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const resp = await fetch('stops_locations.json');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    document.getElementById('loading-msg').textContent = 'Parsing…';
    const raw = await resp.json();

    stopList = Object.entries(raw).map(([id, s]) => {
      const w = latLonToWorld(s.lat, s.lon);
      const hasDay = {};
      for (const route of Object.values(s.routes)) {
        for (const day of Object.keys(route.trips || {})) {
          if (route.trips[day].length > 0) hasDay[day] = true;
        }
      }
      return { id, name: s.name, lat: s.lat, lon: s.lon, wx: w.x, wy: w.y, routes: s.routes, hasDay };
    });

    document.getElementById('loading').style.display = 'none';
    updateTimeDisplay();
    scheduleRender();
  } catch (e) {
    document.getElementById('loading-msg').textContent = `Error: ${e.message}`;
    document.querySelector('#loading h2').textContent = 'Failed to load data';
    document.querySelector('.spinner').style.borderTopColor = '#ff5f3e';
  }
}

loadData();
</script>
</body>
</html>
